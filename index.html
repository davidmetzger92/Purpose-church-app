<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Purpose">
  <meta name="theme-color" content="#0b0f14">
  <meta name="description" content="Purpose Church Goodyear, AZ — Take Your Next Step">
  <title>Purpose Church</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #ee6b2d;
      --bg:     #0b0f14;
      --panel:  #141b22;
      --line:   #222d38;
      --muted:  #9fb0c0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
    }

    /* ── SHARED ── */
    .ic { flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--orange); }
    .ic svg { width: 100%; height: 100%; }
    .chev {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.78); width: 17px; height: 17px; margin-left: auto;
    }
    .chev svg { width: 100%; height: 100%; }

    /* ── HERO ── */
    .hero {
      position: relative;
      min-height: 248px;
      display: flex;
      flex-direction: column;
      padding: max(env(safe-area-inset-top), 17px) 18px 16px;
      overflow: hidden;
      background-color: var(--bg);
    }
    .hero::before {
      content: ""; position: absolute; inset: 0;
      background-image: var(--heroimg);
      background-size: cover; background-position: center var(--hpy, 35%);
    }
    .hero::after {
      content: ""; position: absolute; inset: 0;
      background:
        linear-gradient(102deg, rgba(8,11,15,.95), rgba(8,11,15,.62) 38%, rgba(8,11,15,.2) 64%, rgba(8,11,15,.5)),
        linear-gradient(180deg, rgba(8,11,15,0) 54%, rgba(11,15,20,1) 100%);
    }
    .hero > * { position: relative; z-index: 1; }
    .logo { height: 24px; width: auto; align-self: flex-start; margin-bottom: auto; }
    .h1 {
      font-family: 'Archivo', sans-serif;
      font-weight: 900; font-size: 40px; line-height: .9;
      letter-spacing: -.02em; color: #fff; text-transform: uppercase;
      margin-top: 52px;
    }
    .sub {
      margin-top: 12px; align-self: flex-start;
      color: var(--muted); font-size: 12.5px;
      display: inline-flex; gap: 7px; align-items: center;
      background: rgba(255,255,255,.08); padding: 7px 13px; border-radius: 20px;
    }
    .sub svg { width: 14px; height: 14px; }
    .sub b { color: #fff; font-weight: 600; }

    /* ── STACKED PHOTO BANDS ── */
    .bands { padding: 13px 14px 4px; display: flex; flex-direction: column; gap: 10px; }
    .band {
      position: relative; height: 74px; border-radius: 14px; overflow: hidden;
      display: flex; align-items: center; gap: 13px; padding: 0 15px;
      text-decoration: none; border: 1px solid var(--line);
      background-color: var(--panel);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease;
    }
    .band:active { transform: scale(0.985); }
    .band::before {
      content: ""; position: absolute; inset: 0;
      background-image: var(--i);
      background-size: cover; background-position: center var(--py, 50%);
    }
    .band::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(8,11,15,.95), rgba(8,11,15,.84) 40%, rgba(8,11,15,.32) 76%, rgba(8,11,15,.1));
    }
    .band > * { position: relative; z-index: 1; }
    .band .ic { width: 26px; height: 26px; }
    .band .nm {
      font-family: 'Archivo', sans-serif;
      font-weight: 800; font-size: 16.5px; color: #fff;
      text-transform: uppercase; letter-spacing: .01em;
    }

    /* ── DISCOVER FOOTER ── */
    .disc {
      position: relative; margin: 12px 14px 0; min-height: 140px;
      display: flex; flex-direction: column; justify-content: center;
      padding: 19px 18px; overflow: hidden; border-radius: 14px;
      border: 1px solid var(--line); background-color: var(--panel);
    }
    .disc::before {
      content: ""; position: absolute; inset: 0;
      background-image: var(--d);
      background-size: cover; background-position: center var(--dpy, 40%);
    }
    .disc::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(8,11,15,.95) 6%, rgba(8,11,15,.58) 58%, rgba(8,11,15,.3));
    }
    .disc > * { position: relative; z-index: 1; }
    .disc-h {
      font-family: 'Archivo', sans-serif;
      font-weight: 900; font-size: 19px; line-height: 1; color: #fff;
      text-transform: uppercase; letter-spacing: -.01em;
    }
    .disc-r { width: 36px; height: 3px; background: var(--orange); margin: 9px 0; border-radius: 2px; }
    .disc-p { font-size: 11.5px; color: var(--muted); line-height: 1.4; max-width: 210px; }

    /* ── INSTALL (PWA) ── */
    .install-wrap { padding: 14px; }
    .install-hint {
      display: none; align-items: center; gap: 8px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 11px 13px; font-size: 12px; color: var(--muted);
    }
    .install-hint svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--orange); }
    .install-hint b { color: #fff; font-weight: 600; }
    .install-hint .x { margin-left: auto; cursor: pointer; opacity: 0.6; font-size: 16px; line-height: 1; }
    .install-btn {
      display: none; align-items: center; justify-content: center; gap: 9px;
      width: 100%; background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 13px; color: #fff;
      font-family: 'Archivo', sans-serif; font-weight: 700; font-size: 13px;
      text-transform: uppercase; letter-spacing: .03em; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .install-btn svg { width: 17px; height: 17px; color: var(--orange); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     Content lives in content.json (edited via /admin).
     Photos live in /photos. Do not hard-code text or
     links here — edit content.json instead.
     ═══════════════════════════════════════════════ -->

<div class="app">

  <header class="hero" id="js-hero">
    <img class="logo" src="logos/logo-horizontal-white.png" alt="Purpose Church">
    <h1 class="h1" id="js-headline"></h1>
    <span class="sub" id="js-times" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <b id="js-times-text"></b>
    </span>
  </header>

  <nav class="bands" id="js-bands"></nav>

  <section class="disc" id="js-disc">
    <h2 class="disc-h" id="js-disc-h"></h2>
    <div class="disc-r"></div>
    <p class="disc-p" id="js-disc-p"></p>
  </section>

  <div class="install-wrap">
    <div class="install-hint" id="js-install-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M8 8l4-4 4 4"/><path d="M4 20h16"/></svg>
      <span>Tap <b>Share</b>, then <b>Add to Home Screen</b> for the full app.</span>
      <span class="x" id="js-close-hint">&times;</span>
    </div>
    <button class="install-btn" id="js-install-btn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v12"/><path d="M8 12l4 4 4-4"/><path d="M4 20h16"/></svg>
      Install app
    </button>
  </div>

</div>


<script>
// ── Inline SVG icon set (replaces the Tabler webfont) ──────────────
// 24×24, stroke=currentColor so .ic{color:var(--orange)} tints them.
var ICONS = {
  user:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/></svg>',
  file:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>',
  users:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3.3 2.7-5 6-5s6 1.7 6 5"/><path d="M16 4.8a3.5 3.5 0 0 1 0 6.4"/><path d="M17.5 15c2.2.5 3.5 2 3.5 5"/></svg>',
  sparkle:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/><path d="M18.5 15.5l.7 1.8 1.8.7-1.8.7-.7 1.8-.7-1.8-1.8-.7 1.8-.7z"/></svg>',
  gift:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><line x1="12" y1="8" x2="12" y2="21"/><path d="M12 8S11 3 8.5 3a2.5 2.5 0 0 0 0 5z"/><path d="M12 8s1-5 3.5-5a2.5 2.5 0 0 1 0 5z"/></svg>',
  pin:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',
  heart:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 10-7 10z"/></svg>',
  calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="2"/><line x1="4" y1="9" x2="20" y2="9"/><line x1="8" y1="3" x2="8" y2="6"/><line x1="16" y1="3" x2="16" y2="6"/></svg>',
  book:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4a2 2 0 0 1 2-2h11v16H7a2 2 0 0 0-2 2z"/><path d="M5 20a2 2 0 0 1 2-2h11"/></svg>',
  music:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="18" r="2.5"/><circle cx="17" cy="16" r="2.5"/><path d="M9.5 18V6l10-2v12"/></svg>',
  hands:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13V5.5a1.5 1.5 0 0 1 3 0V11"/><path d="M11 5.5a1.5 1.5 0 0 1 3 0V11"/><path d="M14 6.5a1.5 1.5 0 0 1 3 0V14a6 6 0 0 1-6 6h-1a6 6 0 0 1-5.2-3l-1.8-3.1a1.6 1.6 0 0 1 2.7-1.7L8 14"/></svg>',
  chevron:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>'
};

// ── Hardcoded fallback so a failed content.json fetch never blanks the screen ──
var FALLBACK = {
  hero: {
    image: "photos/hero.jpg",
    headline: "Take Your Next Step",
    serviceTimes: "Sundays 9 & 10:30am"
  },
  tiles: [
    { icon: "user",    label: "I'm New",             url: "https://purposearizona.com/connectcard", image: "photos/tile-new.jpg" },
    { icon: "file",    label: "Message Notes",       url: "https://purposearizona.com/notes",       image: "photos/tile-notes.jpg" },
    { icon: "users",   label: "Join the Dream Team", url: "https://purposearizona.com/serve",       image: "photos/tile-serve.jpg" },
    { icon: "sparkle", label: "Spiritual Gifts",     url: "https://purposearizona.com/page/830?GroupGuid=64c2fe8a-4c62-424e-8282-281500baab2b", image: "photos/tile-gifts.jpg" },
    { icon: "gift",    label: "Give",                url: "https://purpose.mywell.org",             image: "photos/tile-give.jpg" },
    { icon: "pin",     label: "Plan a Visit",        url: "https://www.google.com/maps/search/?api=1&query=Desert+Edge+High+School+15778+W+Yuma+Rd+Goodyear+AZ+85338", image: "photos/tile-visit.jpg" }
  ],
  discover: {
    heading: "Discover Your Purpose",
    body: "We believe you were made on purpose, for a purpose. Come find yours with us.",
    image: "photos/discover.jpg"
  }
};

// ── Render ─────────────────────────────────────────
function bgVar(value) {
  // The CMS may store image paths as root-absolute ("/photos/x.jpg"), which
  // breaks under the GitHub Pages subfolder. Strip the leading slash so paths
  // resolve relative to this page — works at a subfolder, root, or custom domain.
  var v = String(value).replace(/^\//, '');
  return "url('" + v.replace(/'/g, "%27") + "')";
}

function makeBand(tile) {
  var a = document.createElement('a');
  a.className = 'band';
  a.href = tile.url || '#';
  a.target = '_blank';
  a.rel = 'noopener';
  if (tile.image) a.style.setProperty('--i', bgVar(tile.image));
  if (tile.focus) a.style.setProperty('--py', tile.focus);

  var ic = document.createElement('span');
  ic.className = 'ic';
  ic.innerHTML = ICONS[tile.icon] || ICONS.pin;

  var nm = document.createElement('span');
  nm.className = 'nm';
  nm.textContent = tile.label || tile.title || '';

  var ch = document.createElement('span');
  ch.className = 'chev';
  ch.innerHTML = ICONS.chevron;

  a.appendChild(ic);
  a.appendChild(nm);
  a.appendChild(ch);
  return a;
}

function render(data) {
  data = data || FALLBACK;

  // Hero
  var hero = document.getElementById('js-hero');
  if (data.hero && data.hero.image) hero.style.setProperty('--heroimg', bgVar(data.hero.image));
  if (data.hero && data.hero.focus) hero.style.setProperty('--hpy', data.hero.focus);
  document.getElementById('js-headline').textContent = (data.hero && data.hero.headline) || '';

  var times = (data.hero && data.hero.serviceTimes) || data.times || '';
  var pill = document.getElementById('js-times');
  if (times) {
    document.getElementById('js-times-text').textContent = times;
    pill.style.display = 'inline-flex';
  } else {
    pill.style.display = 'none';
  }

  // Bands
  var bands = document.getElementById('js-bands');
  bands.textContent = '';
  (data.tiles || []).forEach(function (t) { bands.appendChild(makeBand(t)); });

  // Discover footer
  var disc = data.discover || {};
  var discEl = document.getElementById('js-disc');
  if (disc.image) discEl.style.setProperty('--d', bgVar(disc.image));
  if (disc.focus) discEl.style.setProperty('--dpy', disc.focus);
  document.getElementById('js-disc-h').textContent = disc.heading || '';
  document.getElementById('js-disc-p').textContent = disc.body || '';
}

// Cache-bust so edits show up promptly even with the service worker.
fetch('content.json?v=' + Date.now())
  .then(function (res) {
    if (!res.ok) throw new Error('content fetch failed');
    return res.json();
  })
  .then(render)
  .catch(function () { render(FALLBACK); });

// ── iOS install hint ───────────────────────────────
var isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
var inApp     = window.navigator.standalone === true;
var dismissed = sessionStorage.getItem('hint-dismissed');
if (isIOS && !inApp && !dismissed) {
  document.getElementById('js-install-hint').style.display = 'flex';
}
document.getElementById('js-close-hint').addEventListener('click', function () {
  document.getElementById('js-install-hint').style.display = 'none';
  sessionStorage.setItem('hint-dismissed', '1');
});

// ── Android / Chrome install prompt ────────────────
var deferredPrompt = null;
var installBtn     = document.getElementById('js-install-btn');

window.addEventListener('beforeinstallprompt', function (e) {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'flex';
});
installBtn.addEventListener('click', function () {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(function () {
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });
});
window.addEventListener('appinstalled', function () {
  installBtn.style.display = 'none';
});

// ── Service Worker ─────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
