# ─────────────────────────────────────────────────────────────
#  Admin panel configuration
#  This controls WHICH fields staff can edit. It is intentionally
#  limited to content — staff cannot change the app's structure.
# ─────────────────────────────────────────────────────────────

backend:
  name: github
  repo: davidmetzger92/Purpose-church-app   # owner/repo
  branch: main
  # base_url points at your free login relay (Cloudflare Worker).
  base_url: https://sveltia-cms-auth.david-metzger92.workers.dev

# Uploaded photos land in /photos. Paths are stored relative ("photos/…")
# so they resolve correctly under the GitHub Pages subfolder.
media_folder: "photos"
public_folder: "photos"

# A single, friendly editing screen mapped to content.json.
collections:
  - name: app
    label: "App Content"
    files:
      - name: home
        label: "Home Screen"
        file: "content.json"
        description: "Edit the headline, photos, buttons, and text shown in the app."
        fields:
          # ── HERO ──
          - label: "Hero (top of screen)"
            name: hero
            widget: object
            fields:
              - label: "Background Photo"
                name: image
                widget: image
                hint: "Landscape photo, at least ~1600×950px. The left side is darkened for the logo + headline."
              - label: "Image Focus"
                name: focus
                widget: select
                required: false
                default: "35%"
                hint: "Which part of the photo shows — move the crop up or down."
                options:
                  - { label: "Top", value: "0%" }
                  - { label: "Upper", value: "25%" }
                  - { label: "Center", value: "50%" }
                  - { label: "Lower", value: "75%" }
                  - { label: "Bottom", value: "100%" }
              - label: "Headline"
                name: headline
                widget: string
                hint: 'Big text over the photo, e.g. "Take Your Next Step"'
              - label: "Service Times"
                name: serviceTimes
                widget: string
                hint: 'Shown in the pill, e.g. "Sundays 9 & 10:30am"'

          # ── DESTINATION BANDS ──
          - label: "Buttons (photo bands)"
            name: tiles
            widget: list
            label_singular: "Button"
            summary: "{{fields.label}}"
            hint: "Add, remove, reorder, or rename the photo bands on the home screen."
            fields:
              - { label: "Label", name: label, widget: string }
              - label: "Icon"
                name: icon
                widget: select
                hint: "Pick an icon for the band (shown in orange)."
                options:
                  - { label: "Person / New here", value: user }
                  - { label: "Notes / Document", value: file }
                  - { label: "People / Groups / Serve", value: users }
                  - { label: "Sparkle / Gifts", value: sparkle }
                  - { label: "Gift / Give", value: gift }
                  - { label: "Map pin / Location", value: pin }
                  - { label: "Heart", value: heart }
                  - { label: "Calendar / Events", value: calendar }
                  - { label: "Book / Bible", value: book }
                  - { label: "Music / Worship", value: music }
                  - { label: "Hands / Serving", value: hands }
              - label: "Link URL"
                name: url
                widget: string
                hint: "Where the band goes. Opens in the browser."
              - label: "Background Photo"
                name: image
                widget: image
                hint: "Wide letterbox band. For a perfect fit, crop to about 1600×250px (~6.5:1). Otherwise use Image Focus below to pick which slice shows."
              - label: "Image Focus"
                name: focus
                widget: select
                required: false
                default: "50%"
                hint: "Which part of the photo shows in the band — move the crop up or down."
                options:
                  - { label: "Top", value: "0%" }
                  - { label: "Upper", value: "25%" }
                  - { label: "Center", value: "50%" }
                  - { label: "Lower", value: "75%" }
                  - { label: "Bottom", value: "100%" }

          # ── DISCOVER FOOTER ──
          - label: "Discover Footer"
            name: discover
            widget: object
            fields:
              - { label: "Heading", name: heading, widget: string }
              - { label: "Body Text", name: body, widget: text }
              - label: "Background Photo"
                name: image
                widget: image
                hint: "Wide banner. For a perfect fit, crop to about 1600×460px (~3.5:1)."
              - label: "Image Focus"
                name: focus
                widget: select
                required: false
                default: "40%"
                hint: "Which part of the photo shows — move the crop up or down."
                options:
                  - { label: "Top", value: "0%" }
                  - { label: "Upper", value: "25%" }
                  - { label: "Center", value: "50%" }
                  - { label: "Lower", value: "75%" }
                  - { label: "Bottom", value: "100%" }

          # ── LEGACY (kept so older revert points still work) ──
          - { label: "Service Times (legacy)", name: times, widget: string, required: false }
          - label: "Location (legacy)"
            name: location
            widget: object
            required: false
            fields:
              - { label: "Place Name", name: name, widget: string, required: false }
              - { label: "Address", name: address, widget: string, required: false }
              - { label: "Google Maps Link", name: mapsUrl, widget: string, required: false }
          - { label: "Give Link (legacy)", name: giveUrl, widget: string, required: false }
